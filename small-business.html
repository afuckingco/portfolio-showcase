<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="5 static business websites for small businesses">
<title>Small Business Websites</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
body{background:#f8fafc;color:#1e293b;line-height:1.6;padding:40px 20px}
.container{max-width:800px;margin:0 auto}
h1{color:#0f172a;text-align:center;margin-bottom:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
a.card{display:block;background:#fff;border-radius:12px;padding:25px;text-decoration:none;color:inherit;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .2s;border:1px solid #e2e8f0}
a.card:hover{transform:translateY(-3px);border-color:#38bdf8}
.card h2{font-size:1.15rem;color:#0f172a;margin-bottom:8px}
.card p{font-size:.85rem;color:#64748b}
footer{text-align:center;margin-top:40px;color:#94a3b8;font-size:.85rem}
</style>
</head>
<body>
<div class="container">
<h1>🏢 Small Business Websites</h1>
<div class="grid">
<a class="card" href="restaurant/index.html"><h2>Warung Rasa Nusantara</h2><p>Website restoran</p></a>
<a class="card" href="coffee-shop/index.html"><h2>Kopi Senja</h2><p>Website kedai kopi</p></a>
<a class="card" href="minimarket/index.html"><h2>Toko Kita</h2><p>Website minimarket</p></a>
<a class="card" href="apotek/index.html"><h2>Apotek Sehat Farma</h2><p>Website apotek</p></a>
<a class="card" href="perusahaan/index.html"><h2>PT. Cipta Solusi Nusantara</h2><p>Website perusahaan</p></a>
</div>
<footer>© 2026 • Static HTML/CSS</footer>
</div>
</body>
</html>
